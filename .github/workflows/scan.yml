name: Ladki Bahin Agent - Scan

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore agent state
        uses: actions/cache@v4
        with:
          path: |
            agent.db
            pending_state.json
            latest_topics.json
          key: ladki-bahin-agent-${{ hashFiles('config.py', '.github/workflows/scan.yml') }}-v3
          restore-keys: |
            ladki-bahin-agent-${{ hashFiles('config.py', '.github/workflows/scan.yml') }}-
            ladki-bahin-agent-

      - name: Run news scan and handle commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEYS: ${{ secrets.NEWS_API_KEYS }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_PUBLISH_WEBHOOK_URL: ${{ secrets.WP_PUBLISH_WEBHOOK_URL }}
          WP_PUBLISH_SECRET: ${{ secrets.WP_PUBLISH_SECRET }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python main.py --once
